version: 2

sources:
  - name: raw
    schema: raw            # or your raw schema/database name
    tables:
      - name: customers
      - name: products
      - name: orders

models:
  - name: stg_customerdata
    description: "Cleaned/typed customers from raw.customers"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: email
        tests: [not_null]
      - name: created_at
  - name: stg_productdata
    description: "Cleaned/typed products from raw.products"
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: product_name
        tests: [not_null]
  - name: stg_orders
    description: "Cleaned/typed orders from raw.orders"
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id